<!DOCTYPE html>
<html>
<head>
<title>Luxury Car Showroom</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
color:white;
text-align:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1f1c2c);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
background:rgba(0,0,0,0.6);
padding:15px;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-size:18px;
}

.hero{
padding:100px 20px;
}

.hero h1{
font-size:60px;
}

.btn{
margin-top:30px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:25px;
background:#ff4b2b;
color:white;
cursor:pointer;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:15px;
width:220px;
margin:15px;
padding:10px;
cursor:pointer;
backdrop-filter:blur(10px);
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
}

.details{
margin:40px auto;
width:60%;
padding:25px;
border-radius:15px;
background:rgba(0,0,0,0.7);
display:none;
}

</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#cars">Cars</a>
</nav>

<div class="hero">
<h1>Luxury Car Showroom</h1>
<p>Explore the world's most powerful cars</p>
<button class="btn" onclick="showCars()">Explore Cars</button>
</div>

<div id="cars" class="container"></div>

<div id="details" class="details"></div>

<script>

const cars = [

{
name:"Lamborghini Aventador",
engine:"6.5L V12",
speed:"350 km/h",
price:"$500,000",
img:"https://images.unsplash.com/photo-1511919884226-fd3cad34687c"
},

{
name:"Bugatti Chiron",
engine:"8.0L W16",
speed:"420 km/h",
price:"$3,000,000",
img:"https://images.unsplash.com/photo-1542362567-b07e54358753"
},

{
name:"Ferrari SF90",
engine:"4.0L V8 Hybrid",
speed:"340 km/h",
price:"$625,000",
img:"https://images.unsplash.com/photo-1583121274602-3e2820c69888"
},

{
name:"McLaren 720S",
engine:"4.0L V8",
speed:"341 km/h",
price:"$300,000",
img:"https://images.unsplash.com/photo-1603386329225-868f9b1ee6c9"
},

{
name:"BMW M4",
engine:"3.0L Twin Turbo",
speed:"250 km/h",
price:"$75,000",
img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"
},

{
name:"Mercedes AMG GT",
engine:"4.0L V8",
speed:"315 km/h",
price:"$160,000",
img:"https://images.unsplash.com/photo-1502877338535-766e1452684a"
},

{
name:"Porsche 911",
engine:"3.8L Twin Turbo",
speed:"320 km/h",
price:"$200,000",
img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"
},

{
name:"Nissan GTR",
engine:"3.8L V6",
speed:"315 km/h",
price:"$115,000",
img:"https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2"
},

{
name:"Toyota Supra",
engine:"3.0L Turbo",
speed:"250 km/h",
price:"$60,000",
img:"https://images.unsplash.com/photo-1592198084033-aade902d1aae"
}

];

function showCars(){

const container=document.getElementById("cars");
container.innerHTML="";

cars.forEach((car)=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${car.img}">
<h3>${car.name}</h3>
`;

card.onclick=function(){
showDetails(car);
}

container.appendChild(card);

});

}

function showDetails(car){

const box=document.getElementById("details");

box.style.display="block";

box.innerHTML=`
<h2>${car.name}</h2>
<p><b>Engine:</b> ${car.engine}</p>
<p><b>Top Speed:</b> ${car.speed}</p>
<p><b>Price:</b> ${car.price}</p>
`;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
